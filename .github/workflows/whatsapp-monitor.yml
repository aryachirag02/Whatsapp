# .github/workflows/whatsapp-monitor.yml
# Every ~30 min: pull WhatsApp (read-only) -> build master + 5 team dashboards
# (AI summaries inline, cached) -> deploy to Cloudflare Pages (password-gated).
# Public repo => Actions minutes are free & unlimited.

name: WhatsApp monitor

on:
  schedule:
    # All crons are UTC; IST = UTC+5:30. GitHub may delay/skip under load.
    - cron: "*/15 4-14 * * *"   # every 15 min, 09:30-20:00 IST (peak hours)
    - cron: "30 14-18 * * *"    # hourly, 20:00-00:00 IST (evening wind-down)
    - cron: "30 0-3 * * *"      # hourly, 06:00-09:00 IST (morning ramp-up)
    #                             nothing 00:00-06:00 IST (overnight quiet)
  workflow_dispatch: {}       # manual "Run workflow" button

concurrency:                  # never let two runs fight over the state cache
  group: whatsapp-monitor
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Carry the rolling store + AI summary cache between runs so the pull
      # stays incremental and unchanged threads never re-hit the AI API.
      - name: Restore state from previous run
        uses: actions/cache/restore@v4
        with:
          path: |
            messages_latest.json
            attendees.json
            state.json
            group_list_cache.json
            ai_summaries.json
            attendee_maps.json
            dms_latest.json
            inbox_ai.json
            webflow_leads.json
            leads_ai.json
          key: wa-state-${{ github.run_id }}
          restore-keys: |
            wa-state-

      # API key arrives via env (not inlined) so it never lands in the rendered
      # command; GitHub masks it in logs. dsn + account_id aren't credentials.
      - name: Write config.json
        env:
          UNIPILE_API_KEY: ${{ secrets.UNIPILE_API_KEY }}
        run: |
          cat > config.json <<EOF
          {
            "api_key": "${UNIPILE_API_KEY}",
            "dsn": "https://api55.unipile.com:18582",
            "accounts": {
              "FbN6fZUpTfGcLfbjC9Nkig": "sat",
              "mwKJGuboQdyIJRi_bg_-7A": "ap",
              "dJZmfM7SRkKvZI_DIj_J4A": "ib",
              "J1Rf7e92QWKq5KxTiwMqZA": "igcse",
              "-J7zk8yNT5WV5L1ZjZJ40w": "myp",
              "KUgjojLpQnKSJmRxddvgvg": "else"
            },
            "dm_account": "8FuaZkyiTp6o0mNJiSfKsw",
            "lookback_days": 7,
            "exclude_keywords": ["coordination","content","grading","internal","team","staff","accounts","tracking","tech issues","payglocal","non sat"]
          }
          EOF

      - name: Fetch "Not relevant" flags from the dashboard
        env:
          DASH_USER: ${{ secrets.DASHBOARD_USER }}
          DASH_PASS: ${{ secrets.DASHBOARD_PASS }}
        run: |
          curl -fsS -u "$DASH_USER:$DASH_PASS" https://apguru-whatsapp.pages.dev/api/flags \
            -o flagged_groups.json || echo '{}' > flagged_groups.json
          # If the response isn't valid JSON (e.g. old worker served HTML), fall back to no flags.
          python -c "import json;json.load(open('flagged_groups.json'))" 2>/dev/null || echo '{}' > flagged_groups.json
          python -c "import json;print(len(json.load(open('flagged_groups.json'))),'flagged groups excluded')"

      - name: Pull messages (READ-ONLY)
        env:
          UNIPILE_API_KEY: ${{ secrets.UNIPILE_API_KEY }}
        run: python unipile_pull.py

      - name: Build dashboards (master + 5 teams; AI summaries inline, cached)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python report_engine.py

      - name: Build owner worry list
        run: python ceo_report.py

      - name: Build reply inbox (owner DMs; drafts in owner's voice, cached)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python inbox_report.py

      - name: Build leads dashboard (Webflow x WhatsApp cross-check)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEBFLOW_TOKEN: ${{ secrets.WEBFLOW_TOKEN }}
        run: python leads_report.py

      - name: Save state for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            messages_latest.json
            attendees.json
            state.json
            group_list_cache.json
            ai_summaries.json
            attendee_maps.json
            dms_latest.json
            inbox_ai.json
            webflow_leads.json
            leads_ai.json
          key: wa-state-${{ github.run_id }}

      # Master at "/", each team at its own clean path (/sat, /ap, ...).
      - name: Stage site (master + 5 team dashboards + auth worker)
        run: |
          mkdir -p _site
          cp dashboard.html        _site/index.html
          cp dashboard_sat.html    _site/sat.html
          cp dashboard_ap.html     _site/ap.html
          cp dashboard_ib.html     _site/ib.html
          cp dashboard_igcse.html  _site/igcse.html
          cp dashboard_myp.html    _site/myp.html
          cp dashboard_else.html   _site/else.html
          cp dashboard_ceo.html    _site/ceo.html
          cp dashboard_inbox.html  _site/inbox.html
          cp dashboard_leads.html  _site/leads.html
          cp chirag_shell.html     _site/chirag.html
          cp _worker.js            _site/_worker.js
          cp logo.png              _site/logo.png 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=apguru-whatsapp --branch=main
